<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - A Loja Burguer</title>
    <style>
        :root {
            --primary-color: #f39c12;
            --bg-color: #121212;
            --bg-card: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR / MENU */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #0a0a0a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
            flex-shrink: 0;
        }

        .sidebar h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5em;
            text-transform: uppercase;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-color);
            border: none;
            padding: 15px;
            text-align: left;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-btn:hover { background-color: #333; }
        .nav-btn.active { background-color: var(--primary-color); color: #000; font-weight: bold; }

        /* CONTEÚDO PRINCIPAL */
        .main-content { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            background-color: var(--bg-color);
        }
        
        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.8em; }

        /* CARDS DO DASHBOARD */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
            border-left: 4px solid var(--primary-color);
        }

        .card h3 { margin: 0; color: var(--text-muted); font-size: 1em; }
        .card .value { font-size: 2em; font-weight: bold; color: #fff; margin-top: 10px; }

        /* TABELAS E RESPONSIVIDADE */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background-color: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px; /* Garante que não esprema no celular */
        }

        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #2a2a2a; color: var(--primary-color); }
        tr:hover { background-color: #333; }

        /* ESTADOS E BOTÕES */
        select.status-select {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .btn-acao {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        .btn-acao:hover { background-color: #d68910; }

        .btn-whats { background-color: #25D366; color: white; }
        .btn-whats:hover { background-color: #1ebe57; }
        
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-danger:hover { background-color: #c0392b; }

        /* FORM ESTOQUE */
        .form-estoque {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 10px;
            align-items: center;
        }
        .form-estoque input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #121212;
            color: white;
            flex: 1;
        }
        .estoque-baixo { color: #e74c3c; font-weight: bold; }

        /* =========================================
           ADAPTAÇÕES PARA CELULAR (MEDIA QUERIES)
           ========================================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* Coloca o menu em cima e conteúdo embaixo */
            }

            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                padding: 10px;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid #333;
                align-items: center;
                /* Oculta barra de rolagem no mobile mas permite rolar */
                scrollbar-width: none; 
            }
            .sidebar::-webkit-scrollbar { display: none; }

            .sidebar h2 {
                display: none; /* Esconde o título do painel no celular para dar espaço aos botões */
            }

            .nav-btn {
                margin-bottom: 0;
                margin-right: 10px;
                padding: 10px 15px;
                font-size: 0.95em;
                text-align: center;
            }

            .main-content {
                padding: 15px;
            }

            .header-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .form-estoque {
                flex-direction: column;
                align-items: stretch;
            }

            .form-estoque input, .form-estoque button {
                width: 100%;
                box-sizing: border-box;
            }

            .cards-grid {
                grid-template-columns: 1fr; /* Cards ocupam a largura toda no celular */
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Painel Burguer</h2>
        <button class="nav-btn active" onclick="mudarSessao('dashboard', this)">📊 Resumo Geral</button>
        <button class="nav-btn" onclick="mudarSessao('pedidos', this)">🍔 Gestão de Pedidos</button>
        <button class="nav-btn" onclick="mudarSessao('estoque', this)">📦 Controle de Estoque</button>
    </div>

    <div class="main-content">
        
        <div id="dashboard" class="section active">
            <div class="header-section">
                <h1>Resumo Geral</h1>
            </div>
            
            <div class="cards-grid">
                <div class="card">
                    <h3>Faturamento Total</h3>
                    <div class="value" id="dash-faturamento">R$ 0,00</div>
                </div>
                <div class="card">
                    <h3>Total de Pedidos</h3>
                    <div class="value" id="dash-qtd-pedidos">0</div>
                </div>
                <div class="card">
                    <h3>Pedidos Pendentes</h3>
                    <div class="value" id="dash-pendentes">0</div>
                </div>
            </div>
            
            <h2>Últimos Pedidos</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nº</th>
                            <th>Cliente</th>
                            <th>Valor Total</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-ultimos-pedidos">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="pedidos" class="section">
            <div class="header-section">
                <h1>Gestão de Pedidos</h1>
                <button class="btn-acao btn-danger" onclick="limparPedidos()">🗑️ Limpar Pedidos do Dia</button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nº</th>
                            <th>Cliente / Contato</th>
                            <th>Itens</th>
                            <th>Endereço</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-pedidos">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="estoque" class="section">
            <div class="header-section">
                <h1>Controle de Estoque</h1>
            </div>
            
            <form class="form-estoque" onsubmit="adicionarEstoque(event)">
                <input type="text" id="est-nome" placeholder="Insumo (Ex: Pão)" required>
                <input type="number" id="est-qtd" placeholder="Qtd" required>
                <input type="text" id="est-unidade" placeholder="Unid (Ex: Kg, Un)" required>
                <button type="submit" class="btn-acao">Adicionar</button>
            </form>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Insumo</th>
                            <th>Quantidade</th>
                            <th>Unidade</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-estoque">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // =======================
        // NAVEGAÇÃO ENTRE ABAS
        // =======================
        function mudarSessao(idSessao, btnClicado) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(idSessao).classList.add('active');
            btnClicado.classList.add('active');
            carregarDados(); 
        }

        // =======================
        // SISTEMA GERAL DE DADOS
        // =======================
        function carregarDados() {
            carregarPedidos();
            carregarEstoque();
        }

        // =======================
        // GESTÃO DE PEDIDOS
        // =======================
        function carregarPedidos() {
            let pedidos = JSON.parse(localStorage.getItem('pedidosLoja') || '[]');
            
            let faturamento = 0;
            let pendentes = 0;
            
            let tbodyPedidos = document.getElementById('tabela-pedidos');
            let tbodyUltimos = document.getElementById('tabela-ultimos-pedidos');
            tbodyPedidos.innerHTML = '';
            tbodyUltimos.innerHTML = '';

            // Renderizando do mais novo pro mais velho
            pedidos.reverse().forEach((pedido, index) => {
                faturamento += pedido.total;
                if(pedido.status === 'Pendente' || pedido.status === 'Preparando') pendentes++;

                let itensStr = pedido.itens.map(i => `${i.qtd}x ${i.nome}`).join('<br>');
                
                // Index real para atualizar o banco de dados depois
                let indexReal = pedidos.length - 1 - index;

                // Tabela da aba "Gestão de Pedidos"
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${pedido.id}</strong></td>
                    <td>${pedido.cliente}<br><small>${pedido.telefone}</small></td>
                    <td>${itensStr}</td>
                    <td>${pedido.endereco}</td>
                    <td>
                        <select class="status-select" onchange="atualizarStatusPedido(${indexReal}, this.value)">
                            <option value="Pendente" ${pedido.status === 'Pendente' ? 'selected' : ''}>Pendente</option>
                            <option value="Preparando" ${pedido.status === 'Preparando' ? 'selected' : ''}>Preparando</option>
                            <option value="Saiu para Entrega" ${pedido.status === 'Saiu para Entrega' ? 'selected' : ''}>Saiu p/ Entrega</option>
                            <option value="Entregue" ${pedido.status === 'Entregue' ? 'selected' : ''}>Entregue</option>
                            <option value="Cancelado" ${pedido.status === 'Cancelado' ? 'selected' : ''}>Cancelado</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-acao btn-whats" onclick="avisarCliente('${pedido.telefone}', '${pedido.cliente}', '${pedido.id}', '${pedido.status}')">📱 Avisar</button>
                    </td>
                `;
                tbodyPedidos.appendChild(tr);

                // Tabela Resumo (Dashboard - max 5)
                if(index < 5) {
                    let trResumo = document.createElement('tr');
                    trResumo.innerHTML = `
                        <td>${pedido.id}</td>
                        <td>${pedido.cliente}</td>
                        <td>R$ ${pedido.total.toFixed(2).replace('.', ',')}</td>
                        <td>${pedido.status}</td>
                    `;
                    tbodyUltimos.appendChild(trResumo);
                }
            });

            // Atualiza Dashboard
            document.getElementById('dash-faturamento').innerText = `R$ ${faturamento.toFixed(2).replace('.', ',')}`;
            document.getElementById('dash-qtd-pedidos').innerText = pedidos.length;
            document.getElementById('dash-pendentes').innerText = pendentes;
        }

        function atualizarStatusPedido(indexReal, novoStatus) {
            let pedidos = JSON.parse(localStorage.getItem('pedidosLoja') || '[]');
            pedidos[indexReal].status = novoStatus;
            localStorage.setItem('pedidosLoja', JSON.stringify(pedidos));
            carregarPedidos(); 
        }

        function avisarCliente(telefone, nome, pedidoId, status) {
            let zap = telefone.replace(/\D/g, ''); 
            
            let mensagem = `Olá, ${nome}! 🍔\nPassando para avisar que seu pedido ${pedidoId} na *A Loja Burguer* foi atualizado para: *${status}*!`;
            
            if(status === 'Saiu para Entrega') {
                mensagem += "\nPrepare-se, o motoboy já está chegando! 🛵💨";
            }
            if(status === 'Entregue') {
                mensagem += "\nBom apetite! Agradecemos a preferência. 🥰";
            }
            if(status === 'Cancelado') {
                mensagem += "\nInfelizmente seu pedido precisou ser cancelado. Entre em contato conosco para mais informações.";
            }

            let url = `https://wa.me/55${zap}?text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }

        // FUNÇÃO DE LIMPAR PEDIDOS
        function limparPedidos() {
            if(confirm("ATENÇÃO: Isso apagará TODOS os pedidos atuais e zerará o faturamento de hoje. Deseja continuar?")) {
                localStorage.removeItem('pedidosLoja'); 
                carregarDados(); 
                alert("Pedidos apagados com sucesso! O painel foi zerado para um novo dia.");
            }
        }

        // =======================
        // GESTÃO DE ESTOQUE
        // =======================
        function carregarEstoque() {
            let estoque = JSON.parse(localStorage.getItem('estoqueLoja'));
            if(!estoque) {
                estoque = [
                    { id: Date.now(), nome: "Pão Brioche", qtd: 50, unidade: "Un." },
                    { id: Date.now()+1, nome: "Carne Artesanal 120g", qtd: 40, unidade: "Un." },
                    { id: Date.now()+2, nome: "Queijo Cheddar", qtd: 5, unidade: "Fatias" }
                ];
                localStorage.setItem('estoqueLoja', JSON.stringify(estoque));
            }

            let tbody = document.getElementById('tabela-estoque');
            tbody.innerHTML = '';

            estoque.forEach((item, index) => {
                let tr = document.createElement('tr');
                let classeBaixo = item.qtd <= 10 ? 'estoque-baixo' : ''; 
                
                tr.innerHTML = `
                    <td><strong>${item.nome}</strong></td>
                    <td class="${classeBaixo}">${item.qtd}</td>
                    <td>${item.unidade}</td>
                    <td>
                        <button class="btn-acao" onclick="editarEstoque(${index})">✏️ Editar Qtd</button>
                        <button class="btn-acao btn-danger" onclick="removerEstoque(${index})">🗑️ Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function adicionarEstoque(e) {
            e.preventDefault();
            let nome = document.getElementById('est-nome').value;
            let qtd = parseInt(document.getElementById('est-qtd').value);
            let unidade = document.getElementById('est-unidade').value;

            let estoque = JSON.parse(localStorage.getItem('estoqueLoja') || '[]');
            estoque.push({ id: Date.now(), nome, qtd, unidade });
            localStorage.setItem('estoqueLoja', JSON.stringify(estoque));
            
            document.getElementById('est-nome').value = '';
            document.getElementById('est-qtd').value = '';
            document.getElementById('est-unidade').value = '';
            
            carregarEstoque();
        }

        function editarEstoque(index) {
            let estoque = JSON.parse(localStorage.getItem('estoqueLoja') || '[]');
            let novaQtd = prompt(`Nova quantidade para ${estoque[index].nome}:`, estoque[index].qtd);
            
            if(novaQtd !== null && novaQtd !== '') {
                estoque[index].qtd = parseInt(novaQtd);
                localStorage.setItem('estoqueLoja', JSON.stringify(estoque));
                carregarEstoque();
            }
        }

        function removerEstoque(index) {
            if(confirm("Tem certeza que deseja excluir este insumo?")) {
                let estoque = JSON.parse(localStorage.getItem('estoqueLoja') || '[]');
                estoque.splice(index, 1);
                localStorage.setItem('estoqueLoja', JSON.stringify(estoque));
                carregarEstoque();
            }
        }

        // Inicializa ao carregar a página
        window.onload = carregarDados;
    </script>
</body>
</html>
